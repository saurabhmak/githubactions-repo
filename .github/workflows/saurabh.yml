name: First Pipeline

on:
  push: 
     branches: [main]
  workflow_dispatch:

jobs:
  job-1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Print Hello
        run: echo "Hello from Linux VM"

  job-2:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Print Hello
        run: echo "Hello from Windows VM"
